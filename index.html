<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapTap Weekly Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f0e;
      --bg2: #151918;
      --bg3: #1c2120;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --green: #3bff8a;
      --green-dim: #1a7a42;
      --green-glow: rgba(59,255,138,0.15);
      --text: #f0f5f2;
      --text2: #7a9488;
      --text3: #4a5e55;
      --gold: #f5c842;
      --silver: #a8b8b0;
      --bronze: #c47a3a;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    html { background: var(--bg); color: var(--text); font-family: var(--mono); }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(59,255,138,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 80%, rgba(59,255,138,0.03) 0%, transparent 50%),
        var(--bg);
    }

    .wrap { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* HEADER */
    header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 2.5rem; gap: 1rem;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .pin {
      width: 42px; height: 42px; flex-shrink: 0;
      background: var(--green); border-radius: 50% 50% 50% 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .pin svg { width: 20px; height: 20px; fill: #0d0f0e; }
    .site-title {
      font-family: var(--display); font-size: 26px; font-weight: 800;
      letter-spacing: -0.03em; color: var(--text);
      line-height: 1.1;
    }
    .site-title span { color: var(--green); }
    .site-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; margin-top: 2px; }
    .week-chip {
      font-size: 11px; font-family: var(--mono);
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 20px; padding: 5px 14px;
      color: var(--text2); white-space: nowrap;
    }
    .week-chip strong { color: var(--green); font-weight: 500; }

    /* SECTION LABEL */
    .section-label {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 12px; font-family: var(--mono);
    }

    /* WEEKLY RECAP BANNER */
    .recap-banner {
      background: linear-gradient(135deg, rgba(59,255,138,0.08) 0%, rgba(59,255,138,0.03) 100%);
      border: 1px solid var(--green-dim);
      border-radius: 14px; padding: 20px 24px;
      margin-bottom: 2.5rem; cursor: pointer;
      transition: all 0.2s;
    }
    .recap-banner:hover {
      border-color: var(--green);
      background: linear-gradient(135deg, rgba(59,255,138,0.12) 0%, rgba(59,255,138,0.05) 100%);
    }
    .recap-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .recap-title {
      font-family: var(--display); font-size: 16px; font-weight: 700;
      color: var(--green); display: flex; align-items: center; gap: 8px;
    }
    .recap-icon { font-size: 18px; }
    .recap-subtitle {
      font-size: 11px; color: var(--text3); letter-spacing: 0.06em;
    }
    .recap-summary {
      font-size: 13px; line-height: 1.6; color: var(--text2);
      margin-bottom: 12px;
    }
    .recap-actions {
      display: flex; gap: 10px; align-items: center;
    }
    .recap-btn {
      font-size: 12px; padding: 6px 14px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 6px; color: var(--text2);
      cursor: pointer; transition: all 0.15s;
      font-family: var(--mono);
    }
    .recap-btn:hover {
      border-color: var(--green); color: var(--green);
    }
    .recap-btn-primary {
      background: var(--green); color: #0d0f0e;
      border-color: var(--green); font-weight: 500;
    }
    .recap-btn-primary:hover {
      background: #5affa0;
    }

    /* PODIUM */
    .podium { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 2.5rem; align-items: end; }
    .pod {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 12px 14px; text-align: center;
      transition: border-color 0.2s;
      position: relative; overflow: hidden;
    }
    .pod::before {
      content: ''; position: absolute; inset: 0; opacity: 0;
      background: var(--green-glow); transition: opacity 0.3s;
    }
    .pod:hover::before { opacity: 1; }
    .pod.first {
      border-color: rgba(245, 200, 66, 0.35);
      margin-bottom: 0;
    }
    .pod.second { margin-bottom: 22px; }
    .pod.third { margin-bottom: 36px; }
    .pod-medal { font-size: 22px; margin-bottom: 6px; display: block; }
    .pod-name {
      font-family: var(--display); font-size: 15px; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .pod-score {
      font-size: 28px; font-weight: 500; font-family: var(--mono);
      color: var(--green); line-height: 1;
    }
    .pod.second .pod-score { color: var(--silver); }
    .pod.third .pod-score { color: var(--bronze); }
    .pod-pts { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.06em; }
    .pod-days { font-size: 10px; color: var(--text3); margin-top: 5px; }

    /* WEEK PROGRESS */
    .week-progress { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 2.5rem; }
    .day-pip {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 4px; text-align: center;
    }
    .day-pip.has-data { border-color: var(--green-dim); }
    .day-pip.today { border-color: var(--green); }
    .day-pip.future { opacity: 0.3; }
    .dp-label { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }
    .day-pip.today .dp-label { color: var(--green); }
    .dp-dot { width: 6px; height: 6px; border-radius: 50%; margin: 5px auto 0; background: var(--border2); }
    .day-pip.has-data .dp-dot { background: var(--green); }
    .day-pip.today .dp-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* TABLE */
    .table-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 2.5rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      padding: 11px 14px; text-align: left;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text3); font-weight: 500; font-family: var(--mono);
    }
    th:not(:first-child):not(:last-child) { text-align: center; }
    th:last-child { text-align: right; }
    td { padding: 0; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    .row-main {
      display: grid;
      grid-template-columns: 200px repeat(var(--day-count, 7), 1fr) 80px;
      align-items: center; cursor: pointer;
      transition: background 0.15s;
      padding: 0;
    }
    .row-main:hover { background: rgba(255,255,255,0.03); }

    .player-cell {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px;
    }
    .rank { font-size: 12px; color: var(--text3); width: 16px; flex-shrink: 0; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500; flex-shrink: 0;
      font-family: var(--display);
    }
    .av-0 { background: rgba(59,255,138,0.15); color: var(--green); }
    .av-1 { background: rgba(168,184,176,0.15); color: var(--silver); }
    .av-2 { background: rgba(196,122,58,0.15); color: var(--bronze); }
    .av-3 { background: rgba(120,100,200,0.15); color: #a08cf0; }
    .player-name { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--text); }

    .day-cell {
      text-align: center; padding: 13px 6px;
      font-size: 13px; color: var(--text2);
    }
    .day-cell.empty { color: var(--text3); }
    .day-cell.best { color: var(--green); font-weight: 500; }

    .total-cell {
      text-align: right; padding: 13px 14px;
      font-size: 14px; font-weight: 500; color: var(--text);
    }
    .expand-icon {
      font-size: 10px; color: var(--text3);
      transition: transform 0.2s; display: inline-block;
      margin-left: 6px;
    }
    .row-wrap.open .expand-icon { transform: rotate(180deg); }

    /* EXPANDED ROUNDS */
    .rounds-row {
      display: none; background: rgba(0,0,0,0.2);
      border-top: 1px solid var(--border);
    }
    .row-wrap.open .rounds-row { display: block; }
    .rounds-inner { padding: 12px 14px 14px; }
    .rounds-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .day-rounds { margin-bottom: 10px; }
    .day-rounds:last-child { margin-bottom: 0; }
    .dr-date { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
    .dr-bars { display: flex; gap: 6px; align-items: flex-end; }
    .dr-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .dr-bar {
      width: 32px; border-radius: 3px 3px 0 0;
      background: var(--green-dim); transition: background 0.2s;
      min-height: 4px;
    }
    .dr-bar.perfect { background: var(--green); }
    .dr-score { font-size: 10px; color: var(--text2); }

    /* HISTORY */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .hist-week {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; cursor: pointer; transition: all 0.15s;
      position: relative;
    }
    .hist-week:hover {
      border-color: var(--border2);
      background: var(--bg3);
    }
    .hist-week.has-recap:hover {
      border-color: var(--green-dim);
    }
    .hist-label { font-size: 12px; color: var(--text2); }
    .hist-winner { font-family: var(--display); font-size: 14px; font-weight: 700; color: var(--green); }
    .hist-scores { display: flex; gap: 12px; }
    .hist-entry { text-align: center; }
    .hist-name { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
    .hist-score { font-size: 13px; color: var(--text2); }
    .recap-indicator {
      position: absolute; top: 10px; right: 10px;
      font-size: 11px; opacity: 0;
      transition: opacity 0.15s;
    }
    .hist-week.has-recap:hover .recap-indicator {
      opacity: 1;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(13, 15, 14, 0.9);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 16px; max-width: 560px; width: 100%;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--display); font-size: 18px; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .modal-subtitle {
      font-size: 12px; color: var(--text3);
    }
    .modal-body {
      padding: 24px;
    }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }

    /* RECAP CARD */
    .recap-card {
      background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
      border: 1px solid var(--green-dim);
      border-radius: 12px; padding: 28px;
      position: relative; overflow: hidden;
    }
    .recap-card::before {
      content: ''; position: absolute;
      top: -50%; right: -20%; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(59,255,138,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .recap-card-header {
      text-align: center; margin-bottom: 24px;
      position: relative; z-index: 1;
    }
    .recap-card-icon {
      font-size: 32px; margin-bottom: 8px;
    }
    .recap-card-title {
      font-family: var(--display); font-size: 20px; font-weight: 800;
      color: var(--text); margin-bottom: 4px;
    }
    .recap-card-title span { color: var(--green); }
    .recap-card-date {
      font-size: 11px; color: var(--text3); letter-spacing: 0.08em;
    }
    
    .recap-stat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 24px;
      position: relative; z-index: 1;
    }
    .recap-stat {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 14px;
      text-align: center;
    }
    .recap-stat-label {
      font-size: 10px; color: var(--text3);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .recap-stat-value {
      font-family: var(--display); font-size: 22px;
      font-weight: 700; color: var(--green);
    }
    .recap-stat-sub {
      font-size: 11px; color: var(--text2); margin-top: 2px;
    }

    .recap-podium-mini {
      margin-bottom: 20px;
      position: relative; z-index: 1;
    }
    .recap-podium-title {
      font-size: 11px; color: var(--text3);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px; text-align: center;
    }
    .recap-podium-row {
      display: flex; justify-content: space-around;
      gap: 10px;
    }
    .recap-podium-item {
      text-align: center; flex: 1;
    }
    .recap-podium-medal { font-size: 20px; margin-bottom: 4px; }
    .recap-podium-name {
      font-family: var(--display); font-size: 13px;
      font-weight: 600; color: var(--text);
      margin-bottom: 4px;
    }
    .recap-podium-score {
      font-size: 16px; font-weight: 500;
      font-family: var(--mono);
    }
    .recap-podium-item:nth-child(1) .recap-podium-score { color: var(--gold); }
    .recap-podium-item:nth-child(2) .recap-podium-score { color: var(--silver); }
    .recap-podium-item:nth-child(3) .recap-podium-score { color: var(--bronze); }

    .recap-insights {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
      position: relative; z-index: 1;
    }
    .recap-insights-title {
      font-size: 11px; color: var(--text3);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .recap-insight {
      font-size: 13px; line-height: 1.6;
      color: var(--text2); margin-bottom: 8px;
    }
    .recap-insight:last-child { margin-bottom: 0; }
    .recap-insight strong { color: var(--green); font-weight: 500; }

    .btn {
      padding: 10px 18px; border-radius: 8px;
      font-family: var(--mono); font-size: 13px;
      cursor: pointer; border: 1px solid var(--border2);
      background: transparent; color: var(--text);
      transition: all 0.15s; font-weight: 500;
    }
    .btn:hover { background: var(--bg3); }
    .btn-primary {
      background: var(--green); color: #0d0f0e;
      border-color: var(--green);
    }
    .btn-primary:hover {
      background: #5affa0; border-color: #5affa0;
    }

    /* FOOTER */
    footer {
      text-align: center; font-size: 11px; color: var(--text3);
      padding-top: 2rem; border-top: 1px solid var(--border);
    }
    footer a { color: var(--text3); text-decoration: none; }
    footer a:hover { color: var(--green); }

    /* NO DATA */
    .no-data {
      text-align: center; padding: 3rem 1rem;
      color: var(--text3); font-size: 13px;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3); border: 1px solid var(--green);
      border-radius: 10px; padding: 12px 20px;
      font-size: 13px; color: var(--green);
      transition: transform 0.3s; z-index: 1001;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .podium { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
      .pod-score { font-size: 22px; }
      th, td { font-size: 11px; }
      .recap-stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-left">
      <div class="pin">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div>
        <div class="site-title">Map<span>Tap</span></div>
        <div class="site-sub">WEEKLY LEADERBOARD</div>
      </div>
    </div>
    <div class="week-chip" id="weekChip">Loading...</div>
  </header>

  <!-- WEEKLY RECAP BANNER (shows for completed weeks) -->
  <div id="recapBanner" style="display:none"></div>

  <!-- PODIUM -->
  <div class="section-label">Weekly podium</div>
  <div class="podium" id="podium">
    <div class="no-data" style="grid-column:1/-1">Loading scores...</div>
  </div>

  <!-- WEEK PROGRESS -->
  <div class="section-label">Days played this week</div>
  <div class="week-progress" id="weekProgress"></div>

  <!-- STANDINGS TABLE -->
  <div class="section-label">Full standings</div>
  <div class="table-card" id="tableCard">
    <div class="no-data">Loading...</div>
  </div>

  <!-- HISTORY -->
  <div id="historySection" style="display:none">
    <div class="section-label">Previous weeks</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <footer>
    <a href="admin.html">+ add scores</a> &nbsp;·&nbsp;
    data from <a href="https://www.maptap.gg" target="_blank">maptap.gg</a>
  </footer>

</div>

<!-- RECAP MODAL -->
<div class="modal-overlay" id="recapModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="recapModalTitle">Week Recap</div>
      <div class="modal-subtitle" id="recapModalSubtitle"></div>
    </div>
    <div class="modal-body" id="recapModalBody">
      <!-- Recap card generated here -->
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeRecapModal()">Close</button>
      <button class="btn btn-primary" onclick="downloadRecap()">Download Image</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];

function getWeekBounds(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun
  const diffToMon = (day === 0 ? -6 : 1 - day);
  const mon = new Date(d); mon.setDate(d.getDate() + diffToMon); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return { mon, sun };
}

function toYMD(date) {
  return date.getFullYear() + '-' +
    String(date.getMonth() + 1).padStart(2, '0') + '-' +
    String(date.getDate()).padStart(2, '0');
}

function fmtWeek(mon, sun) {
  const opts = { day: 'numeric', month: 'short' };
  return `${mon.toLocaleDateString('en-GB', opts)} – ${sun.toLocaleDateString('en-GB', opts)}`;
}

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

const AVATARS = ['av-0','av-1','av-2','av-3'];
const MEDALS = ['🥇','🥈','🥉'];
const POD_CLASSES = ['first','second','third'];

let currentRecapData = null;

// ── recap generation ─────────────────────────────────────────────────────────
function generateRecap(weekData) {
  const { mon, sun, weekNum, players, totals, sorted, byPlayerDate, weekScores } = weekData;
  
  // Calculate insights
  const winner = sorted[0];
  const winnerScore = totals[winner];
  const totalGames = weekScores.length;
  const avgScore = totalGames > 0 ? Math.round(weekScores.reduce((sum, s) => sum + s.final_score, 0) / totalGames) : 0;
  
  // Find best single game
  let bestGame = null;
  weekScores.forEach(s => {
    if (!bestGame || s.final_score > bestGame.score) {
      bestGame = { player: s.player, score: s.final_score, date: s.date };
    }
  });
  
  // Find most consistent player (lowest std dev)
  let mostConsistent = null;
  let lowestStdDev = Infinity;
  sorted.forEach(p => {
    const scores = Object.values(byPlayerDate[p]).map(s => s.final_score);
    if (scores.length >= 3) {
      const mean = scores.reduce((a,b) => a+b, 0) / scores.length;
      const variance = scores.reduce((sum, s) => sum + Math.pow(s - mean, 2), 0) / scores.length;
      const stdDev = Math.sqrt(variance);
      if (stdDev < lowestStdDev) {
        lowestStdDev = stdDev;
        mostConsistent = p;
      }
    }
  });

  // Find biggest improvement (compare to previous week if available)
  let biggestImprovement = null;
  
  // Count perfect rounds (100s)
  const perfectRounds = {};
  players.forEach(p => perfectRounds[p] = 0);
  weekScores.forEach(s => {
    if (s.rounds) {
      s.rounds.forEach(r => {
        if (r === 100) perfectRounds[s.player]++;
      });
    }
  });
  const mostPerfects = Object.keys(perfectRounds).reduce((a, b) => 
    perfectRounds[a] > perfectRounds[b] ? a : b
  );

  const insights = [];
  insights.push(`<strong>${winner}</strong> dominated the week with ${winnerScore.toLocaleString()} total points`);
  
  if (sorted.length >= 2) {
    const gap = totals[sorted[0]] - totals[sorted[1]];
    if (gap < 100) {
      insights.push(`Tight race! Only <strong>${gap} points</strong> separated 1st and 2nd place`);
    } else {
      insights.push(`<strong>${sorted[1]}</strong> finished ${gap} points behind in 2nd place`);
    }
  }
  
  if (bestGame) {
    insights.push(`Best single game: <strong>${bestGame.player}</strong> scored ${bestGame.score} points`);
  }
  
  if (mostConsistent && mostConsistent !== winner) {
    insights.push(`<strong>${mostConsistent}</strong> showed the most consistency across their games`);
  }

  if (perfectRounds[mostPerfects] > 0) {
    insights.push(`<strong>${mostPerfects}</strong> hit ${perfectRounds[mostPerfects]} perfect round${perfectRounds[mostPerfects] > 1 ? 's' : ''} (100 pts)`);
  }

  return {
    weekNum,
    dateRange: fmtWeek(mon, sun),
    winner,
    winnerScore,
    totalGames,
    avgScore,
    podium: sorted.slice(0, 3).map(p => ({ name: p, score: totals[p] })),
    insights,
    players: sorted.map(p => ({ 
      name: p, 
      total: totals[p],
      gamesPlayed: Object.keys(byPlayerDate[p]).length
    }))
  };
}

  document.getElementById('recapModalTitle').textContent = `Week ${recap.weekNum} Recap`;

// ── main ─────────────────────────────────────────────────────────────────────
async function load() {
  let data;
  try {
    const res = await fetch('scores.json?t=' + Date.now());
    data = await res.json();
  } catch(e) {
    document.getElementById('podium').innerHTML = '<div class="no-data">Could not load scores.json</div>';
    return;
  }

  const players = data.players || [];
  const allScores = data.scores || [];

  const today = new Date();
  const { mon, sun } = getWeekBounds(today);
  const weekNum = getWeekNumber(today);

  document.getElementById('weekChip').innerHTML =
    `Week <strong>${weekNum}</strong> · ${fmtWeek(mon, sun)}`;

  // filter this week
  const weekScores = allScores.filter(s => {
    const d = new Date(s.date + 'T12:00:00');
    return d >= mon && d <= sun;
  });

  // dates present this week (Mon–Sun)
  const datesInWeek = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    datesInWeek.push(toYMD(d));
  }

  // which dates have any score
  const datesWithData = new Set(weekScores.map(s => s.date));

  // week progress pips
  const prog = document.getElementById('weekProgress');
  prog.innerHTML = '';
  const todayYMD = toYMD(today);
  datesInWeek.forEach((ymd, i) => {
    const pip = document.createElement('div');
    const dayName = DAY_NAMES[(mon.getDay() + i) % 7] || DAY_NAMES[i === 6 ? 0 : i+1];
    const labelNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const isPast = ymd < todayYMD;
    const isToday = ymd === todayYMD;
    const isFuture = ymd > todayYMD;
    const hasData = datesWithData.has(ymd);
    pip.className = 'day-pip' + (hasData ? ' has-data' : '') + (isToday ? ' today' : '') + (isFuture ? ' future' : '');
    pip.innerHTML = `<div class="dp-label">${labelNames[i]}</div><div class="dp-dot"></div>`;
    prog.appendChild(pip);
  });

  // totals per player
  const totals = {};
  const byPlayerDate = {}; // [player][date] = {final_score, rounds}
  players.forEach(p => { totals[p] = 0; byPlayerDate[p] = {}; });

  weekScores.forEach(s => {
    if (totals[s.player] !== undefined) {
      totals[s.player] += s.final_score;
      byPlayerDate[s.player][s.date] = s;
    }
  });

  // sort players by total
  const sorted = [...players].sort((a,b) => totals[b] - totals[a]);

  // Check if week is complete (it's Monday or later of next week)
  const isWeekComplete = today > sun;
  if (isWeekComplete && sorted.length > 0 && weekScores.length > 0) {
    const recap = generateRecap({ mon, sun, weekNum, players, totals, sorted, byPlayerDate, weekScores });
    const banner = document.getElementById('recapBanner');
    banner.style.display = 'block';
    banner.className = 'recap-banner';
    banner.onclick = () => showRecapModal(recap);
    banner.innerHTML = `
      <div class="recap-header">
        <div class="recap-title">
          <span class="recap-icon">📊</span>
          Week ${weekNum} Recap Available
        </div>
        <div class="recap-subtitle">${recap.dateRange}</div>
      </div>
      <div class="recap-summary">
        ${recap.winner} won with ${recap.winnerScore.toLocaleString()} points across ${recap.totalGames} games. Click to view full recap and insights.
      </div>
      <div class="recap-actions">
        <button class="recap-btn recap-btn-primary" onclick="event.stopPropagation(); showRecapModal(${JSON.stringify(recap).replace(/"/g, '&quot;')})">View Recap</button>
      </div>
    `;
  }

  // ── PODIUM ────────────────────────────────────────────────────────────────
  const podiumEl = document.getElementById('podium');
  if (sorted.length === 0) {
    podiumEl.innerHTML = '<div class="no-data" style="grid-column:1/-1">No scores yet this week.</div>';
  } else {
    const podOrder = sorted.length >= 3
      ? [sorted[1], sorted[0], sorted[2]]
      : sorted.length === 2 ? [null, sorted[0], sorted[1]]
      : [null, sorted[0], null];
    const podCls = ['second','first','third'];

    podiumEl.innerHTML = '';
    podOrder.forEach((player, i) => {
      const div = document.createElement('div');
      if (!player) { div.style.visibility = 'hidden'; div.className = 'pod'; podiumEl.appendChild(div); return; }
      const rank = sorted.indexOf(player);
      div.className = 'pod ' + podCls[i];
      const daysPlayed = Object.keys(byPlayerDate[player]).length;
      div.innerHTML = `
        <span class="pod-medal">${MEDALS[rank] || ''}</span>
        <div class="pod-name">${player}</div>
        <div class="pod-score">${totals[player].toLocaleString()}</div>
        <div class="pod-pts">pts</div>
        <div class="pod-days">${daysPlayed} day${daysPlayed !== 1 ? 's' : ''} played</div>
      `;
      podiumEl.appendChild(div);
    });
  }

  // ── TABLE ─────────────────────────────────────────────────────────────────
  const shownDates = datesInWeek.filter(d => d <= todayYMD);

  const tableCard = document.getElementById('tableCard');
  if (sorted.length === 0) {
    tableCard.innerHTML = '<div class="no-data">No scores yet this week. <a href="admin.html" style="color:var(--green)">Add the first one →</a></div>';
  } else {
    const labelNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    const bestPerDate = {};
    shownDates.forEach(d => {
      let best = 0;
      players.forEach(p => { if (byPlayerDate[p][d]) best = Math.max(best, byPlayerDate[p][d].final_score); });
      bestPerDate[d] = best;
    });

    let html = `<table>
      <thead><tr>
        <th>Player</th>
        ${shownDates.map((d,i) => `<th style="text-align:center">${labelNames[datesInWeek.indexOf(d)]}</th>`).join('')}
        <th style="text-align:right">Total</th>
      </tr></thead>
      <tbody>`;

    sorted.forEach((player, rank) => {
      const avClass = AVATARS[rank % AVATARS.length];
      const initials = player.slice(0,2).toUpperCase();
      const total = totals[player];
      const rowId = `row-${player.replace(/\s/g,'_')}`;

      const dayCells = shownDates.map(d => {
        const entry = byPlayerDate[player][d];
        if (!entry) return `<div class="day-cell empty">–</div>`;
        const isBest = entry.final_score === bestPerDate[d] && entry.final_score > 0;
        return `<div class="day-cell${isBest ? ' best' : ''}">${entry.final_score}</div>`;
      }).join('');

      const roundDays = shownDates.filter(d => byPlayerDate[player][d] && byPlayerDate[player][d].rounds);
      let roundsHtml = '';
      if (roundDays.length > 0) {
        roundsHtml = roundDays.map(d => {
          const entry = byPlayerDate[player][d];
          const dateObj = new Date(d + 'T12:00:00');
          const label = `${MONTH_NAMES[dateObj.getMonth()]} ${dateObj.getDate()}`;
          const bars = entry.rounds.map((r, ri) => {
            const h = Math.round((r / 100) * 48);
            return `<div class="dr-bar-wrap">
              <div class="dr-bar${r === 100 ? ' perfect' : ''}" style="height:${h}px"></div>
              <div class="dr-score">${r}</div>
            </div>`;
          }).join('');
          return `<div class="day-rounds">
            <div class="dr-date">${label} — ${entry.final_score} pts</div>
            <div class="dr-bars">${bars}</div>
          </div>`;
        }).join('');
      } else {
        roundsHtml = '<div style="font-size:12px;color:var(--text3)">No round detail available.</div>';
      }

      html += `
      <tr><td colspan="${shownDates.length + 2}" style="padding:0">
        <div class="row-wrap" id="${rowId}">
          <div class="row-main" onclick="toggleRow('${rowId}')" style="display:grid;grid-template-columns:200px repeat(${shownDates.length},1fr) 80px">
            <div class="player-cell">
              <span class="rank">${rank+1}</span>
              <div class="avatar ${avClass}">${initials}</div>
              <span class="player-name">${player}</span>
              <span class="expand-icon">▼</span>
            </div>
            ${dayCells}
            <div class="total-cell">${total.toLocaleString()}</div>
          </div>
          <div class="rounds-row">
            <div class="rounds-inner">
              <div class="rounds-title">Round breakdown</div>
              ${roundsHtml}
            </div>
          </div>
        </div>
      </td></tr>`;
    });

    html += '</tbody></table>';
    tableCard.innerHTML = html;
  }

  // ── HISTORY ───────────────────────────────────────────────────────────────
  const weeks = {};
  allScores.forEach(s => {
    const d = new Date(s.date + 'T12:00:00');
    const { mon: wm } = getWeekBounds(d);
    const key = toYMD(wm);
    if (key === toYMD(mon)) return;
    if (!weeks[key]) weeks[key] = { mon: wm, scores: [] };
    weeks[key].scores.push(s);
  });

  const histKeys = Object.keys(weeks).sort().reverse();
  if (histKeys.length > 0) {
    document.getElementById('historySection').style.display = 'block';
    const histList = document.getElementById('historyList');
    histList.innerHTML = histKeys.map(key => {
      const { mon: wm, scores } = weeks[key];
      const { sun: ws } = getWeekBounds(wm);
      const wn = getWeekNumber(wm);
      const t = {};
      players.forEach(p => t[p] = 0);
      scores.forEach(s => { if (t[s.player] !== undefined) t[s.player] += s.final_score; });
      const winner = [...players].sort((a,b) => t[b]-t[a])[0];
      const sortedP = [...players].sort((a,b) => t[b]-t[a]);
      
      // Build recap for this historical week
      const byPD = {};
      players.forEach(p => byPD[p] = {});
      scores.forEach(s => {
        if (byPD[s.player]) byPD[s.player][s.date] = s;
      });
      const recap = generateRecap({ 
        mon: wm, sun: ws, weekNum: wn, 
        players, totals: t, sorted: sortedP, 
        byPlayerDate: byPD, weekScores: scores 
      });
      
      return `<div class="hist-week has-recap" onclick='showRecapModal(${JSON.stringify(recap).replace(/'/g, "\\'")})'>
        <div>
          <div class="hist-label">${fmtWeek(wm, ws)}</div>
          <div class="hist-winner">🏆 ${winner}</div>
        </div>
        <div class="hist-scores">
          ${sortedP.map(p => `<div class="hist-entry">
            <div class="hist-name">${p}</div>
            <div class="hist-score">${t[p].toLocaleString()}</div>
          </div>`).join('')}
        </div>
        <span class="recap-indicator">📊</span>
      </div>`;
    }).join('');
  }
}

function toggleRow(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}

load();
</script>
